version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: seemusic-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: seemusic
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: seemusic-backend
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Server=mysql;Port=3306;Database=seemusic;Uid=root;Pwd=root;"
      Jwt__Secret: "your-super-secret-key-change-this-in-production-at-least-32-characters"
      Jwt__Issuer: "SeeMusic"
      Jwt__Audience: "SeeMusic"
    ports:
      - "5001:5001"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend/uploads:/app/uploads

volumes:
  mysql-data:
